name: berth

services:
  berth:
    build: .
    image: berth:1.0
    container_name: berth
    ports:
      - "127.0.0.1:9000:8000"
    environment:
      - BERTH_HOST=0.0.0.0
      - BERTH_PORT=8000
      - BERTH_MODEL=yolo26_classify
      - BERTH_API_KEY=${BERTH_API_KEY:-}
      - BERTH_EPOCHS=30
      - BERTH_BATCH_SIZE=64
    volumes:
      - ./backend/data:/app/data
      - ./backend/models:/app/models
      - ./backend/outputs:/app/outputs
      - ./backend/uploads:/app/uploads
    restart: unless-stopped
