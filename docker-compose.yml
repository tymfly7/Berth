version: '3.8'

services:
  berth:
    build: .
    ports:
      - "8000:8000"
    environment:
      - BERTH_HOST=0.0.0.0
      - BERTH_PORT=8000
      - BERTH_MODEL=demo
      - BERTH_API_KEY=${BERTH_API_KEY:-}
      - BERTH_EPOCHS=30
      - BERTH_BATCH_SIZE=64
    volumes:
      - ./backend/data:/app/data
      - ./backend/models:/app/models
      - ./backend/outputs:/app/outputs
    restart: unless-stopped
