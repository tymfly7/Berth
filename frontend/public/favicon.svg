<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="bg-grad" x1="0" y1="0" x2="64" y2="64" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#060d1f"/>
      <stop offset="100%" stop-color="#0d2040"/>
    </linearGradient>
    <filter id="neon" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="4.5" result="glow-outer"/>
      <feGaussianBlur in="SourceGraphic" stdDeviation="1.8" result="glow-inner"/>
      <feMerge>
        <feMergeNode in="glow-outer"/>
        <feMergeNode in="glow-inner"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="line-glow" x="-20%" y="-80%" width="140%" height="260%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="1" result="lb"/>
      <feMerge>
        <feMergeNode in="lb"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="64" height="64" rx="13" fill="url(#bg-grad)"/>

  <!-- Subtle parking-lot lane lines -->
  <g filter="url(#line-glow)" opacity="0.45" stroke="#1d6fa4" stroke-linecap="round">
    <line x1="8"  y1="53" x2="56" y2="53" stroke-width="1.5"/>
    <line x1="19" y1="44" x2="19" y2="54" stroke-width="1.5"/>
    <line x1="32" y1="44" x2="32" y2="54" stroke-width="1.5"/>
    <line x1="45" y1="44" x2="45" y2="54" stroke-width="1.5"/>
  </g>

  <!-- Neon P -->
  <g filter="url(#neon)" fill="#22d3ee">
    <!-- Vertical bar -->
    <rect x="12" y="8" width="10" height="38" rx="2"/>
    <!-- D-bump -->
    <path d="M 22 8 H 38 Q 53 8 53 21.5 Q 53 35 38 35 H 22 Z"/>
  </g>
</svg>
