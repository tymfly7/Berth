services:
  smartpark-edge:
    image: smartpark-edge:latest
    build:
      context: .
      dockerfile: Dockerfile.edge
      platforms:
        - linux/arm64
    environment:
      - SMARTPARK_DEPLOYMENT=edge
      - SMARTPARK_MODEL=mobilenetv4        # MobileNetV4 recommended for RPi5 CPU
      - SMARTPARK_EDGE_HUB_URL=http://HUB_IP:8000   # replace HUB_IP
      - SMARTPARK_API_KEY=${SMARTPARK_API_KEY:-}
      - SMARTPARK_PORT=8000
    volumes:
      # Persist exported edge models and the local SQLite buffer.
      # Copy edge_mobilenetv4.pte (or .onnx) from hub into ./models/ before first run.
      - ./backend/models:/app/models
      - ./backend/smartpark.db:/app/smartpark.db
    devices:
      # USB camera passthrough — adjust index if using /dev/video1, /dev/video2, etc.
      - /dev/video0:/dev/video0
    ports:
      - "8000:8000"
    restart: unless-stopped
