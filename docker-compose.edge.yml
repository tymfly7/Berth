services:
  berth-edge:
    image: berth-edge:latest
    build:
      context: .
      dockerfile: Dockerfile.edge
      platforms:
        - linux/arm64
    environment:
      - BERTH_DEPLOYMENT=edge
      - BERTH_MODEL=mobilenetv4s       # MobileNetV4 recommended for RPi5 CPU
      - BERTH_EDGE_HUB_URL=http://HUB_IP:8000   # replace HUB_IP
      - BERTH_API_KEY=${BERTH_API_KEY:-}
      - BERTH_PORT=8000
      - BERTH_DB_PATH=/app/edge_data/berth.db
    volumes:
      # Persist exported edge models and the local SQLite buffer.
      # Copy edge_*_ncnn_model/ dirs and *_ncnn_model/ dirs from hub into ./backend/models/ before first run.
      - ./backend/models:/app/models
      - berth_edge_data:/app/edge_data
    ports:
      - "8000:8000"
    restart: unless-stopped

volumes:
  berth_edge_data:
