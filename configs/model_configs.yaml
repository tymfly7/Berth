# Model hyperparameter configurations
# Used for reference and future experimentation

cnn_scratch:
  architecture: "4-block CNN"
  input_size: 224
  channels: [32, 64, 128, 256]
  dropout: 0.5
  learning_rate: 0.001
  weight_decay: 0.0001
  batch_size: 64
  epochs: 30
  optimizer: "Adam"
  loss: "BCELoss"
  scheduler:
    type: "ReduceLROnPlateau"
    patience: 3
    factor: 0.1
  early_stopping:
    patience: 7
    min_delta: 0.001

resnet18:
  architecture: "ResNet18 (Transfer Learning)"
  pretrained: true
  freeze_backbone: true
  classifier_hidden: 256
  dropout: 0.3
  learning_rate: 0.001
  weight_decay: 0.0001
  batch_size: 64
  epochs: 30

mobilenetv2:
  architecture: "MobileNetV2 (Transfer Learning)"
  pretrained: true
  freeze_backbone: true
  classifier_hidden: 256
  dropout: 0.3
  learning_rate: 0.001
  weight_decay: 0.0001
  batch_size: 64
  epochs: 30

data:
  split_ratios:
    train: 0.70
    validation: 0.15
    test: 0.15
  augmentation:
    horizontal_flip: 0.5
    vertical_flip: 0.1
    rotation: 15
    color_jitter:
      brightness: 0.3
      contrast: 0.2
      saturation: 0.2
      hue: 0.05
  normalization:
    mean: [0.485, 0.456, 0.406]
    std: [0.229, 0.224, 0.225]
